<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ef4444'%3E%3Cpath d='M19 14l-7 7m0 0l-7-7m7 7V3'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>SASI — Comando UTI Alpha</title>
  </head>
  <body class="bg-app text-app-text">
    <script>
      // Anti-FOUC: resolve o tema salvo ANTES da primeira pintura (espelha
      // a migração de theme.tsx). Sem isso, quem salvou Clinical via um flash
      // escuro até o React montar. DS: `[data-theme]` no <html>.
      (function () {
        try {
          var v = localStorage.getItem('sasi.theme');
          var t = (v === 'clinical' || v === 'light') ? 'clinical' : 'tactical';
          document.documentElement.setAttribute('data-theme', t);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', t === 'clinical' ? '#eef1f6' : '#0f172a');
        } catch (e) { /* mantém o default tactical do :root */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
