<!-- @template name="Comando UTI — Plantão Board" description="ICU bed-board starting point: navy command sidebar, top bar, gravity-coded LeitoCard grid. Toggle clinical/tactical theme." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SASI · Comando UTI — Plantão</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="./ds-base.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: var(--font-sans); background: var(--surface-app); color: var(--text-body); }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .rail { width: 220px; flex-shrink: 0; background: var(--chrome-bg); color: var(--chrome-text); display: flex; flex-direction: column; padding: 18px 12px; gap: 4px; }
  .rail__brand { display: flex; align-items: center; gap: 10px; padding: 4px 6px 14px; border-bottom: 1px solid var(--chrome-border); margin-bottom: 8px; }
  .rail__mark { width: 36px; height: 36px; border-radius: var(--radius-md); background: linear-gradient(160deg,#2f6fed,#1d4ed8); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(37,99,235,.4); }
  .rail__mark svg { width: 20px; height: 20px; color: #fff; }
  .rail__brand b { font-size: 19px; font-weight: 700; letter-spacing: .14em; }
  .rail__item { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: var(--radius-md); background: transparent; border: none; color: var(--chrome-muted); cursor: pointer; font: 500 var(--text-sm)/1 var(--font-sans); }
  .rail__item svg { width: 17px; height: 17px; }
  .rail__item.on { background: var(--chrome-active); color: #fff; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .top { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; background: var(--surface-card); border-bottom: 1px solid var(--border-default); }
  .top h1 { margin: 0; font-size: var(--text-lg); color: var(--text-heading); white-space: nowrap; }
  .top p { margin: 2px 0 0; font-size: var(--text-xs); color: var(--text-muted); }
  .top__right { display: flex; align-items: center; gap: 9px; }
  .content { flex: 1; overflow-y: auto; padding: 20px 22px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; max-width: 1400px; margin: 0 auto; }
  .icobtn { width: 34px; height: 34px; border-radius: var(--radius-md); border: 1px solid var(--border-default); background: var(--surface-card); color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .icobtn svg { width: 16px; height: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
(function mount() {
  // ds-base.js appends the bundle script asynchronously — poll until it lands.
  const NS = window.SASIComandoUTIDesignSystem_157e25;
  if (!NS) { setTimeout(mount, 30); return; }
  const { LeitoCard, Button, StatPill } = NS;

  // --- Starting-point data: replace with your real source ---
  const BEDS = [
    { id:1, bed:'07', uti:'UTI2', name:'João Silva', age:62, gravity:'stable', sofa:4, deltaSofa:-1,
      problems:[{text:'Sepse pulmonar em resolução', vetor:'↓'}], vm:true, atb:true, pend:1 },
    { id:2, bed:'08', uti:'UTI2', name:'Maria Oliveira', age:58, gravity:'watcher', sofa:6, deltaSofa:1,
      problems:[{text:'Choque séptico foco abdominal', vetor:'='}], dva:1, sed:1, vm:true, atb:true, pend:2 },
    { id:3, bed:'09', uti:'UTI3', name:'Carlos Mendes', age:71, gravity:'critical', sofa:13, deltaSofa:3, septic:true,
      problems:[{text:'Choque séptico SCAI C, foco pulmonar', vetor:'↑'},{text:'IRA KDIGO 3 em HD', vetor:'='}], dva:2, sed:1, vm:true, atb:true, pend:3 },
    { id:4, bed:'10', uti:'UTI3', name:'Ana Costa', age:45, gravity:'unstable', sofa:9, deltaSofa:2,
      problems:[{text:'Choque cardiogênico pós-PCR, ECMO VA', vetor:'↑'}], dva:2, sed:1, vm:true, pend:2 },
    { id:5, bed:'03', uti:'UTI2', name:'Pedro Almeida', age:67, gravity:'stable', sofa:3, deltaSofa:0,
      problems:[{text:'DPOC exacerbado em melhora', vetor:'↓'}], vni:true, atb:true },
    { id:6, bed:'11', uti:'UTI4', name:'Antônio Reis', age:54, gravity:'unstable', sofa:10, deltaSofa:1, septic:true,
      problems:[{text:'Pancreatite necrosante infectada', vetor:'↑'}], dva:1, sed:1, vm:true, atb:true, pend:4 },
  ];

  function App() {
    const [theme, setTheme] = React.useState('clinical');
    const [active, setActive] = React.useState('plantao');
    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme === 'tactical' ? 'tactical' : '');
      if (window.lucide) window.lucide.createIcons();
    });
    const criticos = BEDS.filter(b => b.gravity === 'critical').length;
    const NAV = [['plantao','layout-grid','Visão Geral'],['pacientes','users','Pacientes'],['handoff','clipboard-list','Passagem de Turno'],['exames','flask-conical','Exames'],['alertas','bell','Alertas']];
    return (
      <div className="app">
        <aside className="rail">
          <div className="rail__brand"><div className="rail__mark"><i data-lucide="activity"></i></div><b>SASI</b></div>
          {NAV.map(([id,ic,lb]) => (
            <button key={id} className={'rail__item ' + (active===id?'on':'')} onClick={()=>setActive(id)}>
              <i data-lucide={ic}></i><span>{lb}</span>
            </button>
          ))}
        </aside>
        <div className="main">
          <header className="top">
            <div><h1>Gestão de Pacientes da UTI</h1><p>Visão integrada · Síntese · Decisão</p></div>
            <div className="top__right">
              <StatPill value={BEDS.length} label="ativos" icon={<i data-lucide="users"></i>} />
              <StatPill value={criticos} label="críticos" tone="critical" />
              <Button size="sm" variant="success" icon={<i data-lucide="plus"></i>}>Novo Leito</Button>
              <Button size="sm" variant="secondary" icon={<i data-lucide="file-down"></i>}>PDF</Button>
              <button className="icobtn" title="Tema" onClick={()=>setTheme(theme==='tactical'?'clinical':'tactical')}>
                <i data-lucide={theme==='tactical'?'sun':'moon'}></i>
              </button>
            </div>
          </header>
          <div className="content">
            <div className="grid">
              {BEDS.map(b => <LeitoCard key={b.id} {...b} onClick={()=>{}} />)}
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
})();
</script>
</body>
</html>
