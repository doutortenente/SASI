<!-- @template name="Comando UTI — Ficha do Paciente" description="Ficha estruturada de um leito: Situação Atual, Avaliação por sistemas, Problemas ⇄ Condutas 1:1 (dose + meta) e HPMA + tabelão serial." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SASI · Ficha do Paciente</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="./ds-base.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-app); color: var(--text-body); }
  .page { max-width: 1180px; margin: 0 auto; padding: 22px 24px 60px; }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  .head__id { display: flex; align-items: center; gap: 13px; min-width: 0; }
  .head__bed { font-family: var(--font-mono); font-size: var(--text-2xl); font-weight: 700; color: var(--text-heading); white-space: nowrap; line-height: 1; }
  .head__nm { font-weight: 700; font-size: var(--text-md); color: var(--text-heading); }
  .head__hd { font-size: var(--text-xs); color: var(--text-muted); }
  .head__right { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .full { grid-column: 1 / -1; }
  .sec { font-size: var(--text-2xs); font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-eyebrow); color: var(--text-muted); margin: 0 0 8px; }
  .wrapr { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .labs { width: 100%; border-collapse: collapse; font-size: var(--text-xs); }
  .labs th, .labs td { padding: 6px 9px; text-align: right; }
  .labs th:first-child, .labs td:first-child { text-align: left; }
  .labs thead th { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); border-bottom: 1px solid var(--border-default); }
  .labs tbody td { font-family: var(--font-mono); font-variant-numeric: tabular-nums; border-bottom: 1px solid var(--border-subtle); }
  .labs tbody td:first-child { font-family: var(--font-sans); color: var(--text-heading); font-weight: 600; }
  .labs tr:last-child td { border-bottom: none; }
  .hi { color: var(--grav-critical-solid); font-weight: 700; }
  .lo { color: var(--sys-resp); font-weight: 700; }
  .pair-head, .pair { display: grid; grid-template-columns: 1fr 24px 1.2fr; gap: 10px; align-items: center; }
  .pair-head { padding: 0 2px 7px; }
  .pair { padding: 10px 2px; border-top: 1px solid var(--border-subtle); }
  .conduta { background: var(--surface-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 8px 11px; }
  .conduta b { display: block; font-size: var(--text-xs); color: var(--text-heading); margin-bottom: 3px; }
  .meta { display: inline-flex; align-items: center; gap: 5px; font-size: var(--text-2xs); color: var(--success); font-weight: 700; }
  .meta svg { width: 11px; height: 11px; }
  ul.tight { margin: 0; padding-left: 16px; font-size: var(--text-xs); line-height: 1.7; }
  .icobtn { width: 34px; height: 34px; border-radius: var(--radius-md); border: 1px solid var(--border-default); background: var(--surface-card); color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .icobtn svg { width: 16px; height: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
(function mount() {
  const NS = window.SASIComandoUTIDesignSystem_157e25;
  if (!NS) { setTimeout(mount, 30); return; }
  const { Card, GravityBadge, SofaBadge, TherapyBadge, VitalStat, SystemPanel, ProblemRow, Button } = NS;

  // --- Starting-point data: replace with your real patient ---
  const P = {
    bed: '09', uti: 'UTI3', name: 'Carlos Mendes', age: 71, days: 9,
    gravity: 'critical', sofa: 13, deltaSofa: 3,
    hd: 'IRA dialítica + SDRA grave, foco pulmonar',
    vitals: { pam: 58, fc: 128, spo2: 89, tax: '38.7', fr: 28, bh: '+1240' },
    dva: 2, sed: 1, vm: true, atb: true,
    devices: ['VM (IOT D7)', 'CVC + cateter de HD', 'PAi radial', 'SVD'],
    exame: 'RASS -4. Mal perfundido, TEC 4s, livedo em joelhos. MV+ com estertores difusos. Anúrico entre sessões de HD.',
    eventos: ['↑Nora + associada vasopressina (01h)', 'Hipoxemia SpO₂ 85% → pronação considerada', 'HD antecipada para hoje 10h'],
    pares: [
      { problema: { text: 'Choque séptico SCAI C, foco pulmonar', vetor: '↑', sys: 'hemo', tag: 'Hemo' },
        conduta: { sistema: 'hemo', acao: 'Nora + Vaso; avaliar dobutamina se SvO₂↓', meta: 'PAM ≥ 65, lactato em queda' } },
      { problema: { text: 'IRA KDIGO 3 em hemodiálise', vetor: '=', sys: 'renal', tag: 'Renal' },
        conduta: { sistema: 'renal', acao: 'HD diária, balanço negativo', meta: 'BH negativo 1000 mL/24h' } },
      { problema: { text: 'SDRA moderada-grave', vetor: '↑', sys: 'resp', tag: 'Resp' },
        conduta: { sistema: 'resp', acao: 'VM protetora, prona se P/F < 150', meta: 'SpO₂ 90-94%, driving ≤ 15' } },
    ],
  };
  const LAB_DAYS = ['06/05', '07/05', '08/05', '09/05', '10/05', '11/05'];
  const LABS = [
    { k: 'Leucócitos', vals: [14.2, 16.0, 18.7, 15.4, 12.6, 11.8], f: (v) => v > 12 ? 'hi' : '' },
    { k: 'PCR', vals: [18.0, 16.7, 14.2, 11.4, 9.1, 7.6], f: (v) => v > 5 ? 'hi' : '' },
    { k: 'Lactato', vals: [3.8, 4.1, 3.2, 2.4, 1.9, 1.6], f: (v) => v > 2 ? 'hi' : '' },
    { k: 'Creatinina', vals: [2.1, 2.6, 3.1, 2.8, 2.2, 1.9], f: (v) => v > 1.3 ? 'hi' : '' },
    { k: 'Plaquetas', vals: [180, 142, 98, 110, 134, 156], f: (v) => v < 100 ? 'lo' : '' },
  ];

  function Ficha() {
    const [theme, setTheme] = React.useState('clinical');
    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme === 'tactical' ? 'tactical' : '');
      if (window.lucide) window.lucide.createIcons();
    });
    const v = P.vitals;
    return (
      <div className="page">
        <div className="head">
          <div className="head__id">
            <span className="head__bed">Leito {P.bed}</span>
            <div>
              <div className="head__nm">{P.name}, {P.age}</div>
              <div className="head__hd">{P.uti} · Dia UTI {P.days} · {P.hd}</div>
            </div>
          </div>
          <div className="head__right">
            <GravityBadge level={P.gravity} />
            <SofaBadge score={P.sofa} delta={P.deltaSofa} />
            <Button size="sm" variant="secondary" icon={<i data-lucide="clipboard-list"></i>}>Passagem</Button>
            <Button size="sm" variant="primary" icon={<i data-lucide="file-down"></i>}>Exportar PDF</Button>
            <button className="icobtn" title="Tema" onClick={() => setTheme(theme === 'tactical' ? 'clinical' : 'tactical')}>
              <i data-lucide={theme === 'tactical' ? 'sun' : 'moon'}></i>
            </button>
          </div>
        </div>

        <div className="grid">
          <Card number="3" eyebrow="Eixo Estado" title="Situação Atual">
            <div className="sec">Sinais vitais & balanço 24h</div>
            <div className="wrapr" style={{ marginBottom: 14 }}>
              <VitalStat label="PAM" value={v.pam} status="low" />
              <VitalStat label="FC" value={v.fc} status="high" />
              <VitalStat label="SpO₂" value={v.spo2} unit="%" status="low" />
              <VitalStat label="TAX" value={v.tax} unit="°" status="high" />
              <VitalStat label="FR" value={v.fr} status="high" />
              <VitalStat label="BH" value={v.bh} status="pos" />
            </div>
            <div className="sec">Terapias vigentes & dispositivos</div>
            <div className="wrapr" style={{ marginBottom: 8 }}>
              <TherapyBadge type="dva" count={P.dva} />
              <TherapyBadge type="sed" count={P.sed} />
              <TherapyBadge type="vm" />
              <TherapyBadge type="atb" />
            </div>
            <ul className="tight" style={{ marginBottom: 14 }}>
              {P.devices.map((d, i) => <li key={i}>{d}</li>)}
            </ul>
            <div className="sec">Exame físico</div>
            <p style={{ margin: '0 0 14px', fontSize: 'var(--text-xs)', lineHeight: 1.6 }}>{P.exame}</p>
            <div className="sec">Eventos 24h</div>
            <ul className="tight">
              {P.eventos.map((e, i) => <li key={i}>{e}</li>)}
            </ul>
          </Card>

          <Card number="4" eyebrow="Eixo Problema" title="Avaliação por sistemas">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
              {P.pares.map(({ problema }, i) => (
                <SystemPanel key={i} system={problema.sys}>
                  <ProblemRow text={problema.text} vetor={problema.vetor} />
                </SystemPanel>
              ))}
            </div>
            <div className="sec" style={{ marginTop: 14 }}>Impressão clínica</div>
            <p style={{ margin: 0, fontSize: 'var(--text-xs)', lineHeight: 1.6 }}>
              {P.hd}. Em piora — SOFA subiu {P.deltaSofa} em 24h.
            </p>
          </Card>

          <Card className="full" eyebrow="Eixo Ação" title="Problemas Ativos ⇄ Condutas 12–24h" style={{ gridColumn: '1 / -1' }}>
            <div className="pair-head">
              <span className="sec" style={{ margin: 0 }}>Problema ativo</span>
              <span></span>
              <span className="sec" style={{ margin: 0 }}>Conduta · dose + meta numérica</span>
            </div>
            {P.pares.map(({ problema, conduta }, i) => (
              <div className="pair" key={i}>
                <ProblemRow text={problema.text} vetor={problema.vetor} system={problema.tag} />
                <i data-lucide="arrow-right" style={{ width: 15, height: 15, color: 'var(--text-faint)' }}></i>
                <div className="conduta" style={{ borderLeft: '3px solid var(--sys-' + conduta.sistema + '-bar)' }}>
                  <b>{conduta.acao}</b>
                  <span className="meta"><i data-lucide="target"></i> META: {conduta.meta}</span>
                </div>
              </div>
            ))}
          </Card>

          <Card className="full" number="2" eyebrow="Eixo Tempo · HPMA & Tabelão" title="Paciente Sumário" style={{ gridColumn: '1 / -1' }}>
            <p style={{ fontSize: 'var(--text-sm)', margin: '0 0 12px', lineHeight: 'var(--leading-snug)' }}>
              {P.name}, {P.age} anos, admitido há {P.days} dias por <b style={{ color: 'var(--text-heading)' }}>{P.hd.toLowerCase()}</b>. Acompanhamento serial do laboratório abaixo.
            </p>
            <table className="labs">
              <thead><tr><th>Exame</th>{LAB_DAYS.map((d) => <th key={d}>{d}</th>)}</tr></thead>
              <tbody>
                {LABS.map((row) => (
                  <tr key={row.k}>
                    <td>{row.k}</td>
                    {row.vals.map((val, i) => <td key={i} className={row.f(val)}>{val}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Ficha />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
})();
</script>
</body>
</html>
