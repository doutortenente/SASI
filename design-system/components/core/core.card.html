<!-- @dsCard group="Components" viewport="700x420" name="Core — Buttons, Badges, Inputs, Controls" subtitle="Button · Badge · SegmentedControl · StatPill · Input · Card" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-app); color: var(--text-body); }
  #root { padding: 22px 24px; }
  .grp { margin-bottom: 20px; }
  .grp > .lbl { font-size: var(--text-2xs); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-faint); margin-bottom: 9px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Badge, SegmentedControl, StatPill, Input, Card } = window.SASIComandoUTIDesignSystem_157e25;
  const Ico = (n) => <i data-lucide={n}></i>;

  function Demo() {
    const [view, setView] = React.useState('plantao');
    return (
      <div>
        <div className="grp">
          <div className="lbl">Buttons</div>
          <div className="row">
            <Button variant="primary" icon={Ico('file-down')}>Exportar PDF</Button>
            <Button variant="success" icon={Ico('plus')}>Novo Leito</Button>
            <Button variant="secondary" icon={Ico('clipboard-copy')}>Copiar</Button>
            <Button variant="ghost" icon={Ico('refresh-cw')}>Recarregar</Button>
            <Button variant="soft">Editar</Button>
            <Button variant="danger" icon={Ico('trash-2')}>Remover</Button>
            <Button variant="primary" disabled>Disabled</Button>
            <Button variant="primary" size="sm">sm</Button>
          </div>
        </div>

        <div className="grp">
          <div className="lbl">Badges &amp; Stats</div>
          <div className="row">
            <Badge tone="danger" variant="solid">Crítico</Badge>
            <Badge tone="warning" variant="soft">Watcher</Badge>
            <Badge tone="success" variant="soft">Estável</Badge>
            <Badge tone="accent" variant="outline" icon={Ico('shield-check')}>RLS</Badge>
            <Badge tone="neutral">D4</Badge>
            <span style={{width:'12px'}}></span>
            <StatPill value="33" label="ativos" icon={Ico('users')} />
            <StatPill value="4" label="críticos" tone="critical" onClick={()=>{}} active />
            <StatPill value="SOFA 12" delta={2} tone="critical" />
          </div>
        </div>

        <div className="grp">
          <div className="lbl">Segmented control</div>
          <div className="row">
            <SegmentedControl
              value={view} onChange={setView}
              options={[
                { value:'plantao', label:'Cards', icon: Ico('layout-grid') },
                { value:'round', label:'Round', icon: Ico('list') },
                { value:'editor', label:'Tabela', icon: Ico('table') },
              ]} />
          </div>
        </div>

        <div className="grp" style={{marginBottom:0}}>
          <div className="lbl">Inputs in a card</div>
          <Card title="Patient Summary" eyebrow="Admissão" number="2"
                action={<Button size="sm" variant="soft">Editar</Button>}
                style={{maxWidth:'100%'}}>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginTop:'4px'}}>
              <Input label="E-mail institucional" icon={Ico('mail')} placeholder="dr.nicolas@hospital.com" />
              <Input label="Alergias" placeholder="Nenhuma informada" invalid />
            </div>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 50);
</script>
</body>
</html>
