<!-- @dsCard group="Colors" viewport="700x150" name="Gravity Scale" subtitle="Patient acuity — Stable · Watcher · Unstable · Critical · Deceased" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 22px 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .chip { border-radius: var(--radius-sm); padding: 7px 10px; font-size: var(--text-2xs); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; text-align: center; }
  .bar { height: 40px; border-radius: var(--radius-md); border-left: var(--gravity-bar) solid; display: flex; align-items: center; padding-left: 10px; font-size: var(--text-xs); font-weight: 600; }
  .pt { font-size: var(--text-2xs); color: var(--text-muted); text-align:center; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col">
      <div class="chip" style="background:var(--grav-stable-bg);color:var(--grav-stable-text)">Stable</div>
      <div class="bar" style="border-color:var(--grav-stable-solid);background:color-mix(in srgb,var(--grav-stable-solid) 7%,var(--surface-card))">Estável</div>
      <div class="pt">--grav-stable</div>
    </div>
    <div class="col">
      <div class="chip" style="background:var(--grav-watcher-bg);color:var(--grav-watcher-text)">Watcher</div>
      <div class="bar" style="border-color:var(--grav-watcher-solid);background:color-mix(in srgb,var(--grav-watcher-solid) 7%,var(--surface-card))">Vigiar</div>
      <div class="pt">--grav-watcher</div>
    </div>
    <div class="col">
      <div class="chip" style="background:var(--grav-unstable-bg);color:var(--grav-unstable-text)">Unstable</div>
      <div class="bar" style="border-color:var(--grav-unstable-solid);background:color-mix(in srgb,var(--grav-unstable-solid) 7%,var(--surface-card))">Instável</div>
      <div class="pt">--grav-unstable</div>
    </div>
    <div class="col">
      <div class="chip" style="background:var(--grav-critical-bg);color:var(--grav-critical-text)">Critical</div>
      <div class="bar" style="border-color:var(--grav-critical-solid);background:color-mix(in srgb,var(--grav-critical-solid) 8%,var(--surface-card))">Crítico</div>
      <div class="pt">--grav-critical</div>
    </div>
    <div class="col">
      <div class="chip" style="background:var(--grav-deceased-bg);color:var(--grav-deceased-text)">Deceased</div>
      <div class="bar" style="border-color:var(--grav-deceased-solid);background:color-mix(in srgb,var(--grav-deceased-solid) 7%,var(--surface-card))">Óbito</div>
      <div class="pt">--grav-deceased</div>
    </div>
  </div>
</body>
</html>
