<!-- @dsCard group="Colors" viewport="700x130" name="SOFA & Therapy Badges" subtitle="SOFA score thresholds + therapy/device pills" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-size: var(--text-2xs); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 7px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .sofa { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-lg); display: flex; align-items: baseline; gap: 4px; padding: 2px 8px; }
  .sofa small { font-size: 9px; color: var(--text-faint); font-family: var(--font-sans); }
  .pill { font-size: var(--text-2xs); font-weight: 700; padding: 4px 9px; border-radius: var(--radius-sm); }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="lbl">SOFA thresholds (Δ24h drives gravity)</div>
      <div class="row">
        <span class="sofa" style="color:var(--sofa-low)">2 <small>low</small></span>
        <span class="sofa" style="color:var(--sofa-medium)">6 <small>medium</small></span>
        <span class="sofa" style="color:var(--sofa-high)">10 <small>high</small></span>
        <span class="sofa" style="color:var(--sofa-critical)">14 <small>critical</small></span>
      </div>
    </div>
    <div>
      <div class="lbl">Therapy & device badges</div>
      <div class="row">
        <span class="pill" style="background:var(--badge-dva-bg);color:var(--badge-dva-text)">DVA 2</span>
        <span class="pill" style="background:var(--badge-sed-bg);color:var(--badge-sed-text)">Sed 1</span>
        <span class="pill" style="background:var(--badge-vm-bg);color:var(--badge-vm-text)">VM</span>
        <span class="pill" style="background:var(--badge-vni-bg);color:var(--badge-vni-text)">VNI</span>
        <span class="pill" style="background:var(--badge-atb-bg);color:var(--badge-atb-text)">ATB</span>
        <span class="pill" style="background:var(--badge-pend-bg);color:var(--badge-pend-text)">3 pend.</span>
        <span class="pill" style="background:var(--badge-sepsis-bg);color:var(--badge-sepsis-text)">SEPSE-3</span>
      </div>
    </div>
  </div>
</body>
</html>
