<!-- @dsCard group="Colors" viewport="700x150" name="Neutral Surfaces" subtitle="Clinical (light) surface + text spine" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-app); color: var(--text-body); }
  .wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border-default); display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .tx { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .tx b { font-size: var(--text-sm); }
  .tx span { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--surface-app)"><span>app #EEF1F6</span></div>
      <div class="sw" style="background:var(--surface-card)"><span>card #FFFFFF</span></div>
      <div class="sw" style="background:var(--surface-raised)"><span>raised</span></div>
      <div class="sw" style="background:var(--surface-sunken)"><span>sunken</span></div>
      <div class="sw" style="background:var(--border-default)"><span>border</span></div>
    </div>
    <div class="row" style="gap:18px; padding-left:2px;">
      <div class="tx"><b style="color:var(--text-heading)">Heading</b><span>--text-heading</span></div>
      <div class="tx"><b style="color:var(--text-body)">Body copy</b><span>--text-body</span></div>
      <div class="tx"><b style="color:var(--text-muted)">Muted label</b><span>--text-muted</span></div>
      <div class="tx"><b style="color:var(--text-faint)">Faint / disabled</b><span>--text-faint</span></div>
    </div>
  </div>
</body>
</html>
