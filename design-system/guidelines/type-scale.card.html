<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Dashboard-calibrated scale, eyebrow → hero numerals" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-heading); }
  .wrap { padding: 18px 26px; display: flex; flex-direction: column; gap: 9px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .line .tok { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); width: 120px; flex-shrink: 0; }
  .e { color: var(--text-muted); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tok">--text-2xl · hero</span><span style="font-size:var(--text-2xl);font-weight:700;font-family:var(--font-mono)">SOFA 12</span></div>
    <div class="line"><span class="tok">--text-xl · metric</span><span style="font-size:var(--text-xl);font-weight:700">Leito 07</span></div>
    <div class="line"><span class="tok">--text-lg · section</span><span style="font-size:var(--text-lg);font-weight:600">Situação Atual</span></div>
    <div class="line"><span class="tok">--text-md · card title</span><span style="font-size:var(--text-md);font-weight:600">João Silva, 62</span></div>
    <div class="line"><span class="tok">--text-base · body</span><span style="font-size:var(--text-base)">Sepse de foco pulmonar em desmame</span></div>
    <div class="line"><span class="tok">--text-sm · dense</span><span style="font-size:var(--text-sm);color:var(--text-body)">Noradrenalina 0,16 mcg/kg/min</span></div>
    <div class="line"><span class="tok">--text-2xs · eyebrow</span><span class="e" style="font-size:var(--text-2xs)">Problema Ativo</span></div>
  </div>
</body>
</html>
