<!-- @dsCard group="Colors" viewport="700x140" name="Organ Systems" subtitle="Per-system color coding for structured assessment" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 20px 22px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 9px; }
  .sys { border-radius: var(--radius-md); border-left: var(--gravity-bar) solid; padding: 9px 8px; min-height: 58px; display: flex; flex-direction: column; justify-content: space-between; }
  .sys b { font-size: var(--text-2xs); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
  .sys span { font-family: var(--font-mono); font-size: 8px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sys" style="border-color:var(--sys-neuro-bar);background:var(--sys-neuro-bg)"><b style="color:var(--sys-neuro)">Neuro</b><span>--sys-neuro</span></div>
    <div class="sys" style="border-color:var(--sys-resp-bar);background:var(--sys-resp-bg)"><b style="color:var(--sys-resp)">Resp</b><span>--sys-resp</span></div>
    <div class="sys" style="border-color:var(--sys-hemo-bar);background:var(--sys-hemo-bg)"><b style="color:var(--sys-hemo)">Hemo</b><span>--sys-hemo</span></div>
    <div class="sys" style="border-color:var(--sys-tgi-bar);background:var(--sys-tgi-bg)"><b style="color:var(--sys-tgi)">TGI</b><span>--sys-tgi</span></div>
    <div class="sys" style="border-color:var(--sys-renal-bar);background:var(--sys-renal-bg)"><b style="color:var(--sys-renal)">Renal</b><span>--sys-renal</span></div>
    <div class="sys" style="border-color:var(--sys-hemato-bar);background:var(--sys-hemato-bg)"><b style="color:var(--sys-hemato)">Hemato</b><span>--sys-hemato</span></div>
    <div class="sys" style="border-color:var(--sys-infecto-bar);background:var(--sys-infecto-bg)"><b style="color:var(--sys-infecto)">Infecto</b><span>--sys-infecto</span></div>
  </div>
</body>
</html>
