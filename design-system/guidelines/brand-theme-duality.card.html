<!-- @dsCard group="Brand" viewport="700x200" name="Theme Duality" subtitle="Clinical (light, blue) for rounds · Tactical (dark, red) for night command" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .wrap { display: flex; height: 200px; }
  .pane { flex: 1; padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; background: var(--surface-app); color: var(--text-body); }
  .pane h4 { margin: 0; font-size: var(--text-2xs); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); display:flex; gap:6px; align-items:center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .demo { background: var(--surface-card); border: 1px solid var(--border-default); border-left: var(--gravity-bar) solid var(--grav-critical-solid); border-radius: var(--radius-lg); padding: 12px; box-shadow: var(--shadow-card); flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .demo .bed { font-family: var(--font-mono); font-size: var(--text-xl); font-weight: 700; color: var(--text-heading); }
  .demo .nm { font-size: var(--text-sm); font-weight: 600; color: var(--text-heading); }
  .btn { align-self: flex-start; background: var(--accent); color: var(--text-on-accent); font-size: var(--text-2xs); font-weight: 600; padding: 5px 12px; border-radius: var(--radius-md); }
  .chip { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: var(--radius-sm); align-self: flex-start; background: var(--grav-critical-bg); color: var(--grav-critical-text); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="pane">
      <h4><span class="dot"></span>Clinical · primary</h4>
      <div class="demo">
        <span class="bed">Leito 09</span>
        <span class="nm">Carlos Mendes, 71</span>
        <span class="chip">Crítico</span>
        <span class="btn">Exportar PDF</span>
      </div>
    </div>
    <div class="pane" data-theme="tactical">
      <h4><span class="dot"></span>Tactical · alternate</h4>
      <div class="demo">
        <span class="bed">Leito 09</span>
        <span class="nm">Carlos Mendes, 71</span>
        <span class="chip">Crítico</span>
        <span class="btn">Exportar PDF</span>
      </div>
    </div>
  </div>
</body>
</html>
