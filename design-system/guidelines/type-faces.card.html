<!-- @dsCard group="Type" viewport="700x200" name="Typeface" subtitle="IBM Plex Sans (UI) + IBM Plex Mono (instrument readouts)" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-heading); }
  .wrap { padding: 22px 26px; display: flex; gap: 28px; }
  .col { flex: 1; }
  .tag { font-size: var(--text-2xs); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .big { font-size: 46px; font-weight: 600; line-height: 1; letter-spacing: -.01em; }
  .mono { font-family: var(--font-mono); }
  .glyphs { font-size: var(--text-sm); color: var(--text-body); margin-top: 10px; letter-spacing: .02em; }
  .weights { display: flex; gap: 14px; margin-top: 12px; align-items: baseline; }
  .weights span { font-size: var(--text-md); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col">
      <div class="tag">Sans · UI</div>
      <div class="big">IBM Plex Sans</div>
      <div class="glyphs">Gestão de Pacientes · Síntese · ABCDEFG abcdefg</div>
      <div class="weights">
        <span style="font-weight:400">Regular</span>
        <span style="font-weight:500">Medium</span>
        <span style="font-weight:600">Semibold</span>
        <span style="font-weight:700">Bold</span>
      </div>
    </div>
    <div class="col">
      <div class="tag">Mono · Instrument</div>
      <div class="big mono">0123456789</div>
      <div class="glyphs mono">SOFA 12 · PAM 64 · Leito 07 · BH +1240</div>
      <div class="weights">
        <span class="mono" style="font-weight:400">tnum</span>
        <span class="mono" style="font-weight:600">tabular</span>
        <span class="mono" style="font-weight:700">96.4°</span>
      </div>
    </div>
  </div>
</body>
</html>
