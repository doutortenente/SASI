<!-- @dsCard group="Spacing" viewport="700x150" name="Radius Scale" subtitle="Tight chips → soft cards" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); }
  .wrap { padding: 22px 24px; display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 74px; height: 60px; background: var(--accent-soft); border: 1.5px solid var(--accent); }
  .tok { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
  .px { font-size: var(--text-2xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="tok">--radius-xs</span><span class="px">4px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="tok">--radius-sm</span><span class="px">6px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tok">--radius-md</span><span class="px">8px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tok">--radius-lg</span><span class="px">12px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="tok">--radius-xl</span><span class="px">16px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="tok">--radius-2xl</span><span class="px">20px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="tok">--radius-pill</span><span class="px">full</span></div>
  </div>
</body>
</html>
