<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing & Shadow" subtitle="4px base grid + layered soft elevation" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-app); color: var(--text-body); }
  .wrap { padding: 20px 24px; display: flex; gap: 32px; align-items: center; }
  .grid { display: flex; align-items: flex-end; gap: 8px; }
  .sp { background: var(--accent); width: 16px; }
  .sp + .lab { font-family: var(--font-mono); }
  .col { display:flex; flex-direction:column; gap:6px; }
  .lbl { font-size: var(--text-2xs); font-weight:700; text-transform:uppercase; letter-spacing:.06em; color: var(--text-muted); }
  .shadows { display: flex; gap: 16px; }
  .card { width: 92px; height: 60px; border-radius: var(--radius-lg); background: var(--surface-card); border: 1px solid var(--border-default); display: flex; align-items: flex-end; padding: 7px; font-family: var(--font-mono); font-size: 8px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col">
      <span class="lbl">Spacing · 4px grid</span>
      <div class="grid">
        <div class="sp" style="height:4px"></div>
        <div class="sp" style="height:8px"></div>
        <div class="sp" style="height:12px"></div>
        <div class="sp" style="height:16px"></div>
        <div class="sp" style="height:24px"></div>
        <div class="sp" style="height:32px"></div>
        <div class="sp" style="height:48px"></div>
      </div>
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-faint)">1 · 2 · 3 · 4 · 6 · 8 · 12</span>
    </div>
    <div class="col">
      <span class="lbl">Elevation</span>
      <div class="shadows">
        <div class="card" style="box-shadow:var(--shadow-card)">card</div>
        <div class="card" style="box-shadow:var(--shadow-raised)">raised</div>
        <div class="card" style="box-shadow:var(--shadow-pop)">pop</div>
      </div>
    </div>
  </div>
</body>
</html>
