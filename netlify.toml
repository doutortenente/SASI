# Monorepo: build settings versionados (substitui UI "Base directory")
[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # 24 = LTS ate abr/2028 (20 morreu abr/2026); = nvm default local e MCP sasi
  NODE_VERSION = "24"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200